[alembic]
# Location of migration scripts. Relative to the project root (where you
# invoke `alembic` from).
script_location = alembic

# Template used to generate new revision files. `rev` keeps versions sortable.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision file timestamps.
timezone = UTC

# Allow `.env` interpolation in revision messages.
truncate_slug_length = 60

# IMPORTANT: sqlalchemy.url is intentionally left blank. alembic/env.py reads
# DATABASE_URL from the process environment (loaded from .env when present)
# so the same configuration is used for runtime and migrations.
sqlalchemy.url =


[post_write_hooks]
# Hooks run after `alembic revision` writes a new file. Disabled by default;
# uncomment the block below if you adopt a formatter (e.g. black, ruff).
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
